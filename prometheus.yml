global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'anchorpoint-backend'
    static_configs:
      - targets: ['backend:9464']
    scrape_interval: 5s
    metrics_path: '/metrics'
    
  - job_name: 'anchorpoint-backend-metrics'
    static_configs:
      - targets: ['backend:3002']
    scrape_interval: 5s
    metrics_path: '/metrics'
